<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servent AI Builder</title>
    <!-- Modern Clean Fonts (Geist/Inter style) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style_v6.css">
</head>
<body>

    <div class="app-container">
        
        <!-- Left Sidebar: Automations & Chat History -->
        <aside class="sidebar left-sidebar" id="quick-actions-panel">
            <div class="sidebar-header">
                <i class="fa-solid fa-layer-group logo-icon"></i>
                <span class="logo-text">Servent AI</span>
            </div>
            
            <div class="sidebar-section">
                <h4>Code Assistant</h4>
                <button class="action-btn" data-cmd="Switch to VS Code, read the code currently on my screen, and check it for any bugs or optimizations."><i class="fa-solid fa-file-code"></i> Review VS Code</button>
                <button class="action-btn" data-cmd="Switch to Notepad, read the text currently open, and explain what it does or fix any errors."><i class="fa-solid fa-align-left"></i> Check Notepad</button>
                <button class="action-btn" data-cmd="Read the code on my screen and generate unit tests for it."><i class="fa-solid fa-vial"></i> Write Unit Tests</button>
                <button class="action-btn" data-cmd="Look at the error message visible on my screen, search for a fix, and explain it to me."><i class="fa-solid fa-bug"></i> Debug Error</button>
            </div>
        </aside>

        <!-- Center: Chat Interface (The "Builder" Area) -->
        <main class="chat-workspace">
            <!-- Top Status Header -->
            <header class="workspace-header">
                <div class="header-left">
                    <button class="icon-btn sidebar-toggle" id="sidebar-toggle"><i class="fa-solid fa-bars"></i></button>
                    <div class="connection-pill">
                        <div class="status-dot" id="status-dot"></div>
                        <span id="ws-status">Connecting...</span>
                    </div>
                </div>
                
                <div class="header-right">
                    <div class="time-widget" id="time-widget">00:00</div>
                    <div class="audio-dropdown-container">
                        <button class="icon-btn" id="tts-toggle" title="Audio Options"><i class="fa-solid fa-volume-high"></i></button>
                        <div id="voice-dropdown" class="voice-dropdown-content">
                            <label>Voice Output</label>
                            <select id="voice-select" class="clean-select">
                                <option value="">Loading voices...</option>
                            </select>
                        </div>
                    </div>
                    <button class="icon-btn" id="modes-sidebar-toggle" title="Toggle Config"><i class="fa-solid fa-sliders"></i></button>
                </div>
            </header>

            <!-- Chat Stream -->
            <div class="chat-log" id="chat-log">
                <div class="message system-msg">
                    <div class="msg-bubble">Servent Protocol Online. How can I help you automate today?</div>
                </div>
            </div>
            
            <!-- Input Area -->
            <div class="input-container">
                <div class="action-status">
                    <i class="fa-solid fa-bolt"></i> <span id="action-text">Standby</span>
                </div>
                
                <div class="confirmation-wrapper" id="confirmation-wrapper" style="display: none;">
                    <button class="confirm-btn" id="confirm-btn"><i class="fa-solid fa-check"></i> Approve execution</button>
                    <button class="reject-btn" id="reject-btn"><i class="fa-solid fa-xmark"></i> Cancel</button>
                </div>
                
                <div class="chat-input-wrapper" id="input-wrapper">
                    <input type="file" id="image-upload-input" accept="image/*" style="display: none;">
                    
                    <button id="upload-image-btn" title="Attach Image" class="attachment-btn"><i class="fa-solid fa-paperclip"></i></button>
                    
                    <div id="image-preview-container" style="display: none; align-items: center; background: var(--bg-hover); padding: 4px 8px; border-radius: 6px; margin-right: 8px;">
                        <img id="image-preview" src="" alt="preview" style="max-height: 24px; border-radius: 4px; margin-right: 6px;">
                        <button id="remove-image-btn" style="background: none; border: none; color: var(--danger); cursor: pointer; font-size: 12px;"><i class="fa-solid fa-xmark"></i></button>
                    </div>
                    
                    <input type="text" id="text-command-input" placeholder="Ask Servent to automate a task..." autocomplete="off">
                    <button id="send-btn" class="send-btn"><i class="fa-solid fa-arrow-up"></i></button>
                </div>
                <div class="input-footer">AI can make mistakes. Check your screen before confirming destructive macros.</div>
            </div>
        </main>

        <!-- Right Sidebar: Configuration & Modes -->
        <aside class="sidebar right-sidebar" id="modes-panel">
            <div class="sidebar-header">
                <span class="logo-text" style="font-size: 0.85rem; letter-spacing: 1px;">CONFIGURATION</span>
            </div>

            <div class="sidebar-section">
                <h4>Agent Modes</h4>
                <button class="mode-btn active" data-mode="BOTH" title="Full Ecosystem">Full Ecosystem</button>
                <button class="mode-btn" data-mode="CAMERA_ONLY" title="Cursor Control Only">Vision Cursor</button>
                <button class="mode-btn" data-mode="VOICE_ONLY" title="Voice Assistant Only">Voice Only</button>
                <button class="mode-btn standby" data-mode="STANDBY" title="Standby Mode">Standby (Off)</button>
            </div>
            
            <hr class="sidebar-divider">

            <div class="sidebar-section">
                <h4>Specialized Capabilities</h4>
                <button class="toggle-btn" id="dev-mode-toggle"><i class="fa-solid fa-code"></i> Developer Mode</button>
                <div id="dev-mode-config" class="mode-config-panel">
                    <div style="display: flex; gap: 8px;">
                        <input type="text" id="dev-folder-input" placeholder="e.g. C:\MyProject" class="clean-input">
                        <button id="select-folder-btn" class="icon-btn outline"><i class="fa-solid fa-folder-open"></i></button>
                    </div>
                </div>
                
                <button class="toggle-btn" id="student-mode-toggle"><i class="fa-solid fa-graduation-cap"></i> Student Mode</button>
                <div id="student-mode-config" class="mode-config-panel">
                    <input type="text" id="student-url-input" placeholder="YouTube URL" class="clean-input">
                </div>

                <button class="toggle-btn" id="dictate-toggle"><i class="fa-solid fa-microphone-lines"></i> Dictation Mode</button>
                <button class="toggle-btn" id="meeting-toggle"><i class="fa-solid fa-users-viewfinder"></i> Meeting Copilot</button>
            </div>
        </aside>

    </div>
    
    <script src="app.js"></script>
</body>
</html>
