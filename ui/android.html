<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Servent-AI Remote</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0f172a;
            --surface: #1e293b;
            --primary: #3b82f6;
            --accent: #10b981;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top Bar */
        header {
            background-color: var(--surface);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            z-index: 10;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9em;
            font-weight: 500;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #ff3b30;
            transition: 0.3s;
        }
        .status-dot.active {
            background-color: #34c759;
            box-shadow: 0 0 10px #34c759;
        }

        /* Server Setup */
        #server-setup {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
            text-align: center;
        }
        
        #server-setup input {
            width: 100%;
            max-width: 300px;
            padding: 15px;
            margin: 20px 0;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: var(--surface);
            color: white;
            font-size: 1.1em;
            text-align: center;
        }

        #server-setup button {
            padding: 15px 30px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: 600;
            width: 100%;
            max-width: 300px;
        }

        /* Chat Area */
        #chat-log {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-msg {
            align-self: flex-end;
        }
        .user-msg .msg-bubble {
            background: var(--primary);
            border-radius: 18px 18px 0 18px;
        }

        .system-msg {
            align-self: flex-start;
        }
        .system-msg .msg-bubble {
            background: var(--surface);
            border-radius: 18px 18px 18px 0;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .msg-bubble {
            padding: 12px 16px;
            line-height: 1.4;
            font-size: 0.95em;
            word-wrap: break-word;
        }

        /* Input Area */
        .input-area {
            background-color: var(--surface);
            padding: 15px;
            display: flex;
            gap: 10px;
            align-items: center;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-bottom: env(safe-area-inset-bottom, 15px);
        }

        input[type="text"] {
            flex: 1;
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 12px 20px;
            border-radius: 25px;
            font-size: 1em;
            outline: none;
        }

        .icon-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            color: white;
            border: none;
            font-size: 1.2em;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .primary-btn {
            background: var(--primary);
        }
        
        #action-text {
            text-align: center;
            font-size: 0.8em;
            color: var(--accent);
            padding: 10px;
            background: rgba(16, 185, 129, 0.1);
        }
    </style>
</head>
<body>

    <div id="server-setup">
        <h2><i class="fa-solid fa-satellite-dish" style="color: var(--primary); margin-bottom: 20px; font-size: 2em;"></i><br>Connect to Brain</h2>
        <p style="color: var(--text-dim); margin-top: 10px;">Enter your laptop's Local IP Address<br>(e.g. 192.168.1.5)</p>
        <input type="text" id="ip-input" placeholder="192.168.1.x">
        <button id="connect-btn">Connect</button>
    </div>

    <header>
        <div style="font-weight: 600; font-size: 1.1em;">
            <i class="fa-solid fa-brain" style="color: var(--primary); margin-right: 8px;"></i>
            Servent Remote
        </div>
        <div class="status">
            <div class="status-dot" id="status-dot"></div>
            <span id="ws-status" style="color: var(--text-dim);">Offline</span>
        </div>
    </header>
    
    <div id="action-text" style="display: none;">Standby</div>

    <div id="chat-log">
        <!-- Messages go here -->
    </div>

    <div class="input-area">
        <input type="text" id="text-input" placeholder="Message PC...">
        <button class="icon-btn primary-btn" id="send-btn"><i class="fa-solid fa-paper-plane"></i></button>
    </div>

    <script src="app_android.js"></script>
</body>
</html>
